<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airmee — Delivery Flow Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Google Identity Services + Drive API -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --a-green:    #3DB54A;
  --a-green-d:  #2A8E35;
  --a-green-dk: #1C5C23;
  --a-green-l:  #EBF7EC;
  --a-red:      #E53935;
  --a-red-d:    #B71C1C;
  --a-red-l:    #FEECEC;
  --a-amber:    #F59E0B;
  --a-amber-l:  #FFFBEB;
  --a-purple:   #7C3AED;
  --a-purple-l: #F5F3FF;
  --a-navy:     #1E3A5F;
  --a-navy-l:   #EEF4FF;
  --a-teal:     #0F766E;
  --a-teal-l:   #CCFBF1;

  /* Actor palette */
  --c-retailer:  #0369A1; --c-retailer-l: #E0F2FE; --c-retailer-m: #0EA5E9;
  --c-api:       #1C5C23; --c-api-l:     #EBF7EC;  --c-api-m:     #3DB54A;
  --c-terminal:  #92400E; --c-terminal-l:#FEF9EE;  --c-terminal-m:#D97706;
  --c-courier:   #A16207; --c-courier-l: #FFF7ED;  --c-courier-m: #EA580C;
  --c-consumer:  #1D4ED8; --c-consumer-l:#EFF6FF;  --c-consumer-m:#3B82F6;
  --c-admin:     #6B21A8; --c-admin-l:   #F5F3FF;  --c-admin-m:   #9333EA;
  --c-store:     #0F766E; --c-store-l:   #CCFBF1;  --c-store-m:   #14B8A6;
  --c-sms:       #BE185D; --c-sms-l:     #FCE7F3;  --c-sms-m:     #EC4899;

  --border:   #E5E7EB;
  --bg:       #F9FAFB;
  --surface:  #FFFFFF;
  --text:     #111827;
  --text-2:   #4B5563;
  --muted:    #9CA3AF;
  --step-w:   172px;
  --row-h:    96px;
  --actor-w:  128px;
}

html, body { height:100%; overflow:hidden; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; }

/* ── Topbar ── */
.topbar { height:50px; background:var(--a-green-dk); display:flex; align-items:center; padding:0 18px; flex-shrink:0; gap:8px; }
.logo-mark { width:27px; height:27px; background:var(--a-green); border-radius:7px; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:#fff; }
.logo-name { font-family:'Syne',sans-serif; font-size:14px; font-weight:600; color:#fff; margin-left:6px; }
.logo-div  { width:1px; height:14px; background:rgba(255,255,255,0.2); margin:0 8px; }
.logo-sub  { font-size:11.5px; color:rgba(255,255,255,0.45); }

/* ── Layer bar ── */
.layer-bar { display:flex; flex-direction:column; border-bottom:2px solid var(--border); background:var(--surface); flex-shrink:0; }
.layer-row { display:flex; align-items:center; min-height:42px; border-bottom:1px solid var(--border); padding:0 14px; gap:5px; }
.layer-row:last-child { border-bottom:none; }
.layer-label { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); width:66px; flex-shrink:0; }
.chips { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }

.chip { padding:4px 12px; border-radius:999px; border:1.5px solid var(--border); background:var(--surface); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; color:var(--text-2); cursor:pointer; transition:all .13s; white-space:nowrap; display:flex; align-items:center; gap:4px; user-select:none; }
.chip:hover { border-color:var(--a-green); color:var(--a-green-d); }
.chip.svc-active { background:var(--a-green-dk); color:#fff; border-color:var(--a-green-dk); font-weight:600; }
.chip.chk { font-size:11px; padding:3px 10px; }
.chip.chk.on { background:var(--a-navy-l); color:var(--a-navy); border-color:var(--a-navy); }
.chip.chk .dot { width:5px; height:5px; border-radius:50%; background:var(--a-navy); opacity:0; }
.chip.chk.on .dot { opacity:1; }

.chip.f-happy.on    { background:var(--a-green);  color:#fff; border-color:var(--a-green);  font-weight:600; }
.chip.f-fail.on     { background:var(--a-red);    color:#fff; border-color:var(--a-red);   }
.chip.f-amber.on    { background:var(--a-amber);  color:#fff; border-color:var(--a-amber); }
.chip.f-navy.on     { background:var(--a-navy);   color:#fff; border-color:var(--a-navy);  }
.chip.f-purple.on   { background:var(--a-purple); color:#fff; border-color:var(--a-purple);}

/* ── Main ── */
.main { display:flex; flex:1; overflow:hidden; }

/* ── Journey ── */
.journey-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.journey-scroll { flex:1; overflow:auto; scrollbar-width:auto; scrollbar-color:#CBD5E1 transparent; }
.journey-scroll::-webkit-scrollbar { height:8px; width:5px; }
.journey-scroll::-webkit-scrollbar-track { background:var(--bg); }
.journey-scroll::-webkit-scrollbar-thumb { background:#CBD5E1; border-radius:99px; }
.journey-scroll::-webkit-scrollbar-corner { background:var(--bg); }
.journey-inner { display:inline-flex; flex-direction:column; min-width:100%; }

/* Phase track */
.phase-track { display:flex; position:sticky; top:0; z-index:20; background:var(--surface); border-bottom:1px solid var(--border); }
.actor-spacer { width:var(--actor-w); flex-shrink:0; border-right:1px solid var(--border); background:var(--surface); }
.phase-group { display:flex; flex-direction:column; border-right:1px solid var(--border); }
.phase-group:last-child { border-right:none; }
.phase-label-cell { padding:4px 12px; font-size:8.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); background:var(--bg); border-bottom:1px solid var(--border); white-space:nowrap; }
.phase-step-headers { display:flex; }
.step-hdr { width:var(--step-w); flex-shrink:0; padding:5px 6px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-right:1px solid var(--border); cursor:pointer; transition:background .12s; text-align:center; }
.step-hdr:last-child { border-right:none; }
.step-hdr:hover { background:var(--a-green-l); }
.step-hdr.col-sel { background:var(--a-green-l); }
.step-num { font-size:8px; font-weight:700; font-family:'DM Mono',monospace; color:var(--muted); margin-bottom:2px; }
.step-hdr-title { font-size:10px; font-weight:600; color:var(--text-2); line-height:1.3; padding:0 3px; }

/* Actor rows */
.actor-rows { display:flex; flex-direction:column; }
.actor-row { display:flex; align-items:stretch; border-bottom:1px solid var(--border); min-height:var(--row-h); }
.actor-row:last-child { border-bottom:none; }
.actor-label { width:var(--actor-w); flex-shrink:0; display:flex; flex-direction:column; align-items:flex-start; justify-content:center; padding:8px 11px; gap:2px; border-right:1px solid var(--border); position:sticky; left:0; z-index:10; background:var(--surface); }
.actor-icon { font-size:15px; }
.actor-name { font-size:10px; font-weight:700; line-height:1.2; }
.actor-sub  { font-size:8.5px; color:var(--muted); }

.row-retailer  .actor-label { background:var(--c-retailer-l); }  .row-retailer  .actor-name { color:var(--c-retailer); }
.row-api       .actor-label { background:var(--c-api-l); }       .row-api       .actor-name { color:var(--c-api); }
.row-terminal  .actor-label { background:var(--c-terminal-l); }  .row-terminal  .actor-name { color:var(--c-terminal); }
.row-courier   .actor-label { background:var(--c-courier-l); }   .row-courier   .actor-name { color:var(--c-courier); }
.row-consumer  .actor-label { background:var(--c-consumer-l); }  .row-consumer  .actor-name { color:var(--c-consumer); }
.row-admin     .actor-label { background:var(--c-admin-l); }     .row-admin     .actor-name { color:var(--c-admin); }
.row-store     .actor-label { background:var(--c-store-l); }     .row-store     .actor-name { color:var(--c-store); }
.row-sms       .actor-label { background:var(--c-sms-l); }       .row-sms       .actor-name { color:var(--c-sms); }

.step-cells { display:flex; flex:1; }
.step-cell { width:var(--step-w); flex-shrink:0; display:flex; align-items:center; justify-content:center; padding:8px 7px; border-right:1px solid var(--border); position:relative; transition:background .12s; }
.step-cell:last-child { border-right:none; }
.step-cell.empty { background:var(--bg); }
.step-cell.col-sel:not(.empty) { background:var(--a-green-l); }
.step-cell.col-sel.empty { background:rgba(61,181,74,.05); }

.step-card { width:100%; border-radius:8px; padding:8px 9px; font-size:10.5px; font-weight:500; line-height:1.38; text-align:center; border:1.5px solid; cursor:pointer; transition:box-shadow .12s,transform .12s; }
.step-card:hover { box-shadow:0 3px 10px rgba(0,0,0,.1); transform:translateY(-1px); }
.step-card.selected { box-shadow:0 0 0 2.5px var(--a-green-dk),0 4px 14px rgba(28,92,35,.18); transform:translateY(-2px); }

.step-card.retailer  { background:var(--c-retailer-l);  color:var(--c-retailer);  border-color:var(--c-retailer-m);  }
.step-card.api       { background:var(--c-api-l);       color:var(--c-api);       border-color:var(--c-api-m);       }
.step-card.terminal  { background:var(--c-terminal-l);  color:var(--c-terminal);  border-color:var(--c-terminal-m);  }
.step-card.courier   { background:var(--c-courier-l);   color:var(--c-courier);   border-color:var(--c-courier-m);   }
.step-card.consumer  { background:var(--c-consumer-l);  color:var(--c-consumer);  border-color:var(--c-consumer-m);  }
.step-card.admin     { background:var(--c-admin-l);     color:var(--c-admin);     border-color:var(--c-admin-m);     }
.step-card.store     { background:var(--c-store-l);     color:var(--c-store);     border-color:var(--c-store-m);     }
.step-card.sms       { background:var(--c-sms-l);       color:var(--c-sms);       border-color:var(--c-sms-m);       }
.step-card.happy     { background:var(--a-green-l);     color:var(--a-green-d);   border-color:var(--a-green);       }
.step-card.fail      { background:var(--a-red-l);       color:var(--a-red-d);     border-color:var(--a-red);         }
.step-card.warn      { background:var(--a-amber-l);     color:#92400E;            border-color:var(--a-amber);       }
.step-card.navy      { background:var(--a-navy-l);      color:var(--a-navy);      border-color:var(--a-navy);        }
.step-card.purple    { background:var(--a-purple-l);    color:var(--a-purple);    border-color:var(--a-purple);      }

.check-badges { display:flex; flex-wrap:wrap; gap:2px; justify-content:center; margin-top:4px; }
.check-badge  { font-size:8px; font-weight:600; font-family:'DM Mono',monospace; padding:1px 4px; border-radius:3px; background:var(--a-navy-l); color:var(--a-navy); }

/* ── Detail panel ── */
.detail-panel { width:0; flex-shrink:0; display:flex; flex-direction:column; background:var(--surface); border-left:0 solid var(--border); overflow:hidden; transition:width .22s cubic-bezier(.4,0,.2,1),border-width .22s; }
.detail-panel.open { width:350px; border-left-width:1px; }
.detail-top { display:flex; align-items:center; justify-content:space-between; padding:9px 15px; border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; }
.detail-top-label { font-size:9.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
.detail-close { width:22px; height:22px; border-radius:5px; border:1px solid var(--border); background:var(--surface); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--muted); transition:all .12s; }
.detail-close:hover { background:var(--a-red-l); color:var(--a-red-d); border-color:var(--a-red); }
.detail-scroll { flex:1; overflow-y:auto; padding:16px; }
.detail-scroll::-webkit-scrollbar { width:4px; }
.detail-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
.d-content { animation:fadeUp .18s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

.flow-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:999px; font-size:10px; font-weight:600; border:1px solid; margin-bottom:10px; }
.flow-badge.happy  { background:var(--a-green-l); color:var(--a-green-d); border-color:var(--a-green); }
.flow-badge.fail   { background:var(--a-red-l);   color:var(--a-red-d);  border-color:var(--a-red);   }
.flow-badge.warn   { background:var(--a-amber-l); color:#92400E;         border-color:var(--a-amber); }
.flow-badge.navy   { background:var(--a-navy-l);  color:var(--a-navy);   border-color:var(--a-navy);  }
.flow-badge.purple { background:var(--a-purple-l);color:var(--a-purple); border-color:var(--a-purple);}

.d-step-num   { font-size:9.5px; color:var(--muted); font-family:'DM Mono',monospace; margin-bottom:2px; }
.d-step-title { font-size:16px; font-weight:600; font-family:'Syne',sans-serif; letter-spacing:-.02em; line-height:1.2; margin-bottom:10px; }
.actor-pill   { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:999px; font-size:10.5px; font-weight:600; margin-bottom:13px; }

.d-sec  { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:12px 0 6px; }
.d-desc { font-size:12.5px; color:var(--text-2); line-height:1.65; }
.tag-wrap { display:flex; flex-wrap:wrap; gap:4px; }
.tag { padding:3px 8px; border-radius:5px; font-size:10.5px; font-weight:500; border:1px solid var(--border); background:var(--bg); color:var(--text-2); }
.notif-item { display:flex; align-items:center; gap:7px; padding:7px 10px; background:var(--bg); border:1px solid var(--border); border-radius:7px; margin-bottom:4px; font-size:11.5px; color:var(--text-2); }
.ndot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.divider { height:1px; background:var(--border); margin:12px 0; }
.chk-row { display:flex; align-items:flex-start; gap:7px; padding:7px 9px; border-radius:7px; background:var(--a-navy-l); border:1px solid rgba(30,58,95,.15); margin-bottom:4px; }
.chk-icon { font-size:12px; flex-shrink:0; margin-top:1px; }
.chk-label { font-weight:600; font-size:10.5px; color:var(--a-navy); }
.chk-desc  { font-size:11px; color:var(--text-2); margin-top:1px; line-height:1.4; }

/* Screenshots */
.ss-row  { display:flex; gap:7px; flex-wrap:wrap; margin-top:7px; }
.ss-slot { width:82px; aspect-ratio:9/16; border:1.5px dashed var(--border); border-radius:9px; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; transition:all .13s; position:relative; overflow:hidden; flex-shrink:0; }
.ss-slot:hover:not(.filled) { border-color:var(--a-green); background:var(--a-green-l); }
.ss-slot.filled { border-style:solid; cursor:pointer; }
.ss-slot .ss-icon  { font-size:16px; opacity:.25; }
.ss-slot .ss-label { font-size:8.5px; color:var(--muted); text-align:center; line-height:1.3; padding:0 4px; }
.ss-slot img { width:100%; height:100%; object-fit:cover; }
.ss-slot .ss-rm { position:absolute; top:3px; right:3px; width:15px; height:15px; background:rgba(0,0,0,.55); color:#fff; border:none; border-radius:50%; font-size:8px; cursor:pointer; display:none; align-items:center; justify-content:center; }
.ss-slot.filled:hover .ss-rm { display:flex; }
.ss-slot input[type=file] { display:none; }
.ss-add { width:82px; aspect-ratio:9/16; border:1.5px dashed var(--border); border-radius:9px; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; transition:all .13s; flex-shrink:0; }
.ss-add:hover { border-color:var(--a-green); background:var(--a-green-l); }
.ss-add .ss-plus { font-size:18px; color:var(--muted); }
.ss-add .ss-add-lbl { font-size:8.5px; color:var(--muted); text-align:center; }
.ss-add input[type=file] { display:none; }

/* Lightbox */
.lightbox { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:9999; display:none; align-items:center; justify-content:center; }
.lightbox.open { display:flex; animation:lbIn .18s ease; }
@keyframes lbIn { from{opacity:0} to{opacity:1} }
.lb-inner { position:relative; max-width:380px; max-height:90vh; }
.lb-inner img { max-width:100%; max-height:90vh; border-radius:12px; display:block; }
.lb-close { position:absolute; top:-11px; right:-11px; width:26px; height:26px; background:#fff; border-radius:50%; border:none; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,.3); }
.lb-close:hover { background:var(--a-red-l); color:var(--a-red-d); }

/* Google Drive Auth Banner */
.gdrive-banner { position:fixed; bottom:32px; right:16px; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:10px 14px; font-size:11.5px; color:var(--text-2); box-shadow:0 4px 16px rgba(0,0,0,.10); z-index:8000; display:flex; align-items:center; gap:10px; max-width:320px; transition:opacity .2s; }
.gdrive-banner.hidden { display:none; }
.gdrive-btn { background:var(--a-green); color:#fff; border:none; border-radius:7px; padding:5px 12px; font-size:11px; font-weight:600; cursor:pointer; white-space:nowrap; }
.gdrive-btn:hover { background:var(--a-green-d); }
.gdrive-btn.connected { background:#E8F5E9; color:var(--a-green-d); border:1.5px solid var(--a-green); }
.ss-uploading { opacity:.5; pointer-events:none; }
.ss-slot .ss-spinner { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.7); font-size:18px; }

/* Footer */
.flow-footer { border-top:1px solid var(--border); padding:9px 16px; background:var(--bg); flex-shrink:0; }
.flow-footer-lbl  { font-size:9px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
.flow-footer-text { font-size:11.5px; color:var(--text-2); line-height:1.5; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-mark">A</div>
  <span class="logo-name">Airmee</span>
  <div class="logo-div"></div>
  <span class="logo-sub">Flow Navigator</span>
  <div style="flex:1"></div>
  <button id="refresh-btn" onclick="refreshData()" title="Re-fetch data from Google Sheets" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);color:#fff;border-radius:8px;padding:5px 12px;font-size:11.5px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s;white-space:nowrap;" onmouseover="this.style.background='rgba(255,255,255,0.18)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">
    <span id="refresh-icon" style="font-size:14px;display:inline-block">↻</span> Sync Sheet
  </button>
</div>

<div class="layer-bar">
  <div class="layer-row">
    <div class="layer-label">1 · Service</div>
    <div class="chips" id="svc-chips">
      <button class="chip svc-active" data-svc="home">🏠 Home Delivery</button>
      <button class="chip" data-svc="locker">🔒 Locker Delivery</button>
      <button class="chip" data-svc="point">📦 Collection Point</button>
      <button class="chip" data-svc="flex">⚡ Flex</button>
    </div>
  </div>
  <div class="layer-row">
    <div class="layer-label">2 · Checks</div>
    <div class="chips" id="chk-chips"></div>
  </div>
  <div class="layer-row">
    <div class="layer-label">3 · Flow</div>
    <div class="chips" id="flow-chips"></div>
  </div>
</div>

<div class="main">
  <div class="journey-panel">
    <div class="journey-scroll">
      <div class="journey-inner">
        <div class="phase-track" id="phase-track">
          <div class="actor-spacer"></div>
        </div>
        <div class="actor-rows" id="actor-rows"></div>
      </div>
    </div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-top">
      <span class="detail-top-label">🔍 Step detail</span>
      <button class="detail-close" id="d-close">✕</button>
    </div>
    <div class="detail-scroll">
      <div class="d-content" id="d-content"></div>
    </div>
    <div class="flow-footer">
      <div class="flow-footer-lbl">Current flow</div>
      <div class="flow-footer-text" id="flow-footer-text">—</div>
    </div>
  </div>

// ═══════════════════════════════════════════════════════
// CSV PARSER
// ═══════════════════════════════════════════════════════
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVRow(lines[0]);
  return lines.slice(1).map(l => {
    const vals = parseCSVRow(l);
    const obj = {};
    headers.forEach((h,i) => obj[h.trim()] = (vals[i]||'').trim());
    return obj;
  }).filter(r => r.service && r.flow && r.step_num);
}

function parseCSVRow(line) {
  const result = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

// BUILD SVC_FLOWS FROM CSV ROWS
// ═══════════════════════════════════════════════════════
function buildFlowsFromCSV(rows) {
  const out = { home:{}, locker:{}, point:{}, flex:{} };
  const meta = {
    home: {
      happy:          { label:'✅ Successful',        badge:'happy',  color:'var(--a-green)',   summary:'Parcel delivered successfully on the first attempt.' },
      'no-answer':    { label:'🚪 No Answer',          badge:'fail',   color:'var(--a-red)',     summary:'Consumer not reachable. Auto-reschedule triggered.' },
      'no-address':   { label:'📍 Address Not Found', badge:'warn',   color:'var(--a-amber)',   summary:'Courier cannot locate address. Shipment held pending confirmation.' },
      damaged:        { label:'📦 Damaged',           badge:'navy',   color:'var(--a-navy)',    summary:'Parcel damaged in transit or at handover. Investigation opened.' },
      lost:           { label:'❓ Lost',              badge:'purple', color:'var(--a-purple)',  summary:'Parcel missing from route. Immediate investigation.' },
    },
    locker: {
      happy:           { label:'✅ Successful Drop',   badge:'happy',  color:'var(--a-green)',  summary:'Courier inserts parcel into locker. Consumer collects via QR code or PIN.' },
      'locker-fail':   { label:'🔒 Locker Failure',    badge:'fail',   color:'var(--a-red)',    summary:'Locker offline, full, or inaccessible. Parcel returned to terminal.' },
      'locker-expired':{ label:'⏳ Not Collected',     badge:'warn',   color:'var(--a-amber)',  summary:'Consumer does not collect within expiry window. Returned to retailer.' },
    },
    point: {
      happy:           { label:'✅ Successful Drop',   badge:'happy',  color:'var(--a-green)',  summary:'Courier drops parcel at staffed point. Consumer collects.' },
      'point-closed':  { label:'🏪 Store Closed',      badge:'fail',   color:'var(--a-red)',    summary:'Store inaccessible or staff refuses. Drop-off postponed.' },
      'point-expired': { label:'⏳ Not Collected',     badge:'warn',   color:'var(--a-amber)',  summary:'Consumer does not collect within expiry window. Returned to retailer.' },
    },
    flex: {
      happy:             { label:'✅ Successful Conversion', badge:'happy',  color:'var(--a-green)',   summary:'Consumer converts home delivery to locker or collection point. Delivery executes to converted location.' },
      'flex-proactive':  { label:'🔄 Proactive Switch',      badge:'navy',   color:'var(--a-navy)',    summary:'Consumer switches service before routing. Home delivery never attempted — parcel routes directly to PuP.' },
      'flex-fallback':   { label:'🔁 Auto Fallback',         badge:'warn',   color:'var(--a-amber)',   summary:'Max home delivery attempts reached. Shipment auto-converts to nearest PuP or profile-preferred location.' },
      'flex-ineligible': { label:'🚫 Ineligible Shipment',   badge:'fail',   color:'var(--a-red)',     summary:'Shipment has restricted checks present (ID/age/BankID). Flex UI not shown. Home delivery proceeds normally.' },
    },
  };

  // Collect actor color mappings from card text prefix hints (c: field in old data)
  // In CSV, actor_* columns = card text; we derive color from flow badge or actor type
  const ACTOR_CARD_COLOR = {
    retailer:'retailer', api:'api', terminal:'terminal', courier:'courier',
    sms:'sms', consumer:'consumer', admin:'admin'
  };

  // Pre-index rows by service+flow+step_num for "Same" lookups
  const rowIndex = {};
  rows.forEach(r => {
    const k = `${r.service}|happy|${r.step_num}`;
    if (!rowIndex[k]) rowIndex[k] = r;
    // also index by sid for cross-flow same lookups
    const k2 = `${r.service}|happy|sid:${r.sid}`;
    if (!rowIndex[k2]) rowIndex[k2] = r;
  });

  rows.forEach(r => {
    const { service, flow } = r;
    if (!out[service]) return;
    if (!out[service][flow]) {
      const m = meta[service]?.[flow] || { label: flow, badge:'happy', color:'var(--a-green)', summary:'' };
      out[service][flow] = { label:m.label, badge:m.badge, color:m.color, summary:m.summary, steps:[] };
    }

    // Determine card color based on flow badge and actor
    const badge = meta[service]?.[flow]?.badge || 'happy';
    function cardColor(actorId) {
      // Resolution steps in failure flows: use the failure color
      if (['fail','no-answer','no-address','locker-fail','point-closed','flex-fail','flex-expired','flex-ineligible'].includes(flow) &&
          ['api','courier','admin'].includes(actorId) && r.phase === 'Resolution') return badge;
      if (['damaged'].includes(flow) && r.phase === 'Resolution') return 'navy';
      if (['lost'].includes(flow) && parseInt(r.step_num) >= 5) return 'purple';
      return actorId;
    }

    const actors = {};
    ['retailer','api','terminal','courier','sms','consumer','admin'].forEach(a => {
      let txt = r['actor_'+a];
      // "Same" → look up the happy flow equivalent step and copy its text
      if (txt && txt.trim() === 'Same') {
        const ref = rowIndex[`${service}|happy|${r.step_num}`];
        txt = ref ? ref['actor_'+a] : '';
        if (txt && txt.trim() === 'Same') txt = ''; // guard double-Same
      }
      if (txt && txt.trim()) actors[a] = { c: cardColor(a), t: txt.trim() };
    });

    // Parse pipe-separated list fields
    const sp = v => v ? v.split('|').map(x=>x.trim()).filter(Boolean) : [];

    const step = {
      id: parseInt(r.step_num),
      sid: r.sid,
      title: r.step_title,
      phase: r.phase,
      ...actors,
      detail: {
        actor: r.actor_api ? 'api' : Object.keys(actors)[0] || 'api',
        fullTitle: r.full_title || r.step_title,
        desc: r.description || '',
        triggers: sp(r.triggers),
        notifies: [],  // notifies are derived from the actor cells for simplicity
        outputs: sp(r.outputs),
        tags: sp(r.tags),
        ss: r.sms_text ? [{label:'SMS/Push screenshot', app:'sms'}] : [],
        checksRelevant: sp(r.checks_relevant),
      }
    };

    // Auto-build notifies from non-empty actor cells
    ['retailer','api','terminal','courier','sms','consumer','admin'].forEach(a => {
      if (actors[a]) {
        const colorMap = {
          retailer:'var(--c-retailer-m)', api:'var(--c-api-m)', terminal:'var(--c-terminal-m)',
          courier:'var(--c-courier-m)', sms:'var(--c-sms-m)', consumer:'var(--c-consumer-m)', admin:'var(--c-admin-m)'
        };
        step.detail.notifies.push({ color: colorMap[a]||'var(--c-api-m)', label: ACTOR_NAMES[a]+' — '+actors[a].t });
      }
    });

    out[service][flow].steps.push(step);
  });
  return out;
}

// DATA STATUS BANNER
// ═══════════════════════════════════════════════════════
function setDataBanner(state) {
  let bar = document.getElementById('data-banner');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'data-banner';
    bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;padding:5px 14px;font-size:10.5px;font-weight:600;z-index:9000;display:flex;align-items:center;gap:7px;transition:opacity .3s';
    document.body.appendChild(bar);
  }
  const states = {
    loading: { bg:'#1E3A5F', color:'#fff',        icon:'⏳', text:'Loading live data from Google Sheets…' },
    live:    { bg:'#14532D', color:'#BBF7D0',      icon:'🟢', text:'Live data — loaded from Google Sheets' },
    fallback:{ bg:'#78350F', color:'#FEF3C7',      icon:'🟡', text:'Showing built-in data — no Sheet URL configured (see SHEET_CSV_URL in source)' },
    error:   { bg:'#7F1D1D', color:'#FEE2E2',      icon:'🔴', text:'Sheet fetch failed — showing built-in data. Check SHEET_CSV_URL or Sheet publish settings.' },
  };
  const s = states[state];
  bar.style.background = s.bg;
  bar.style.color = s.color;
  bar.innerHTML = `<span>${s.icon}</span><span>${s.text}</span>`;
  if (state === 'live') setTimeout(() => { bar.style.opacity='0'; setTimeout(()=>bar.remove(),500); }, 3500);
}

// ═══════════════════════════════════════════════════════
// LOAD DATA — SHEET OR FALLBACK
// ═══════════════════════════════════════════════════════
async function refreshData() {
  if (!SHEET_CSV_URL) {
    setDataBanner('fallback');
    // Show a tooltip/alert to guide the user
    const btn = document.getElementById('refresh-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '⚠ No Sheet URL set';
    btn.style.background = 'rgba(245,158,11,0.3)';
    btn.style.borderColor = 'rgba(245,158,11,0.6)';
    setTimeout(() => {
      btn.innerHTML = orig;
      btn.style.background = '';
      btn.style.borderColor = '';
    }, 3000);
    return;
  }
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  if (btn) btn.disabled = true;
  if (icon) { icon.style.animation = 'spin .7s linear infinite'; }
  await loadData();
  if (btn) btn.disabled = false;
  if (icon) { icon.style.animation = ''; }
}

async function loadData() {
  if (!SHEET_CSV_URL) {
    setDataBanner('fallback');
    return;
  }
  setDataBanner('loading');

  // When the HTML is opened as a local file (file://) browsers block direct
  // cross-origin fetches. We try the direct URL first (works when hosted),
  // then fall back through two public CORS proxies.
  const PROXIES = [
    url => url,                                                            // direct (works when hosted)
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,            // proxy 1
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, // proxy 2
  ];

  for (const proxy of PROXIES) {
    try {
      const resp = await fetch(proxy(SHEET_CSV_URL), { cache: 'no-cache' });
      if (!resp.ok) continue;
      const text = await resp.text();
      const rows = parseCSV(text);
      if (rows.length < 5) continue;
      const liveFlows = buildFlowsFromCSV(rows);
      Object.assign(SVC_FLOWS.home,   liveFlows.home);
      Object.assign(SVC_FLOWS.locker, liveFlows.locker);
      Object.assign(SVC_FLOWS.point,  liveFlows.point);
      setDataBanner('live');
      buildJourney();
      return; // success — stop trying
    } catch(e) {
      // try next proxy
    }
  }

  // All attempts failed
  console.warn('All Sheet fetch attempts failed');
  setDataBanner('error');
}

const GDRIVE_CLIENT_ID = ''; // ← PASTE YOUR CLIENT ID HERE

const GDRIVE_FOLDER    = 'Airmee Flow Navigator Screenshots';

// shots{} — key → { src: base64orURL, driveId: string|null }
// Persisted to localStorage as JSON (URLs only, not base64)
const shots = (function(){
  try {
    const saved = localStorage.getItem('airmee_shots_v1');
    return saved ? JSON.parse(saved) : {};
  } catch { return {}; }
})();

function saveShots() {
  try {
    // Only persist entries that have a Drive URL (not raw base64)
    const toSave = {};
    Object.entries(shots).forEach(([k,v]) => {
      if (v && typeof v === 'object' && v.url) toSave[k] = { url: v.url, driveId: v.driveId };
      else if (v && typeof v === 'string' && v.startsWith('https://')) toSave[k] = { url: v };
    });
    localStorage.setItem('airmee_shots_v1', JSON.stringify(toSave));
  } catch {}
}

function getShotSrc(k) {
  const v = shots[k];
  if (!v) return null;
  if (typeof v === 'string') return v;
  return v.url || v.src || null;
}

// ── Auth ──────────────────────────────────────────────
function gdriveInit() {
  if (!GDRIVE_CLIENT_ID) return; // no client ID configured — Drive features disabled
  document.getElementById('gdrive-banner').classList.remove('hidden');

  // Try to restore token from sessionStorage
  try {
    const saved = sessionStorage.getItem('gdrive_token');
    if (saved) {
      const t = JSON.parse(saved);
      if (t.expires > Date.now()) { gToken = t.token; setGdriveConnected(); return; }
    }
  } catch {}
}

function gdriveAuth() {
  if (!GDRIVE_CLIENT_ID) {
    alert('Paste your Google OAuth Client ID into GDRIVE_CLIENT_ID in the HTML first.');
    return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GDRIVE_CLIENT_ID,
    scope: GDRIVE_SCOPE,
    callback: (resp) => {
      if (resp.error) { console.error('Drive auth error', resp); return; }
      gToken = resp.access_token;
      // Cache token in sessionStorage (expires in ~1hr)
      try {
        sessionStorage.setItem('gdrive_token', JSON.stringify({
          token: gToken, expires: Date.now() + (resp.expires_in - 60) * 1000
        }));
      } catch {}
      setGdriveConnected();
    }
  });
  client.requestAccessToken();
}

function setGdriveConnected() {
  const btn = document.getElementById('gdrive-btn');
  const status = document.getElementById('gdrive-status');
  btn.textContent = '✓ Connected';
  btn.className = 'gdrive-btn connected';
  btn.onclick = null;
  status.textContent = 'Screenshots will be saved to Google Drive.';
  setTimeout(() => {
    document.getElementById('gdrive-banner').classList.add('hidden');
  }, 3000);
}

// ── Folder lookup / create ────────────────────────────
async function getOrCreateFolder() {
  if (gFolderId) return gFolderId;

  // Search for existing folder
  const q = encodeURIComponent(`mimeType='application/vnd.google-apps.folder' and name='${GDRIVE_FOLDER}' and trashed=false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
    headers: { Authorization: 'Bearer ' + gToken }
  });
  const data = await res.json();
  if (data.files && data.files.length > 0) {
    gFolderId = data.files[0].id;
    return gFolderId;
  }

  // Create folder
  const create = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + gToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: GDRIVE_FOLDER, mimeType: 'application/vnd.google-apps.folder' })
  });
  const folder = await create.json();
  gFolderId = folder.id;
  return gFolderId;
}

// ── Upload file to Drive, return shareable URL ────────
async function uploadToDrive(file, filename) {
  const folderId = await getOrCreateFolder();

  // Upload via multipart
  const meta = JSON.stringify({ name: filename, parents: [folderId] });
  const form = new FormData();
  form.append('metadata', new Blob([meta], { type: 'application/json' }));
  form.append('file', file);

  const upload = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + gToken },
    body: form
  });
  const { id } = await upload.json();

  // Make file publicly readable
  await fetch(`https://www.googleapis.com/drive/v3/files/${id}/permissions`, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + gToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ role: 'reader', type: 'anyone' })
  });

  // Return direct image URL via Drive thumbnail (works as <img src>)
  return { id, url: `https://drive.google.com/thumbnail?id=${id}&sz=w800` };
}

// ── Core upload handler ───────────────────────────────
async function processUpload(file, k, slotEl) {
  // Show preview immediately from local file
  const localSrc = await new Promise(res => {
    const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file);
  });
  shots[k] = { src: localSrc, driveId: null, url: null };
  refreshDetailChecks();

  if (!gToken) {
    // No Drive token — keep as session-only base64, prompt to connect
    document.getElementById('gdrive-banner')?.classList.remove('hidden');
    return;
  }

  // Upload to Drive
  try {
    const filename = `${k}-${Date.now()}.${file.name.split('.').pop()}`;
    const { id, url } = await uploadToDrive(file, filename);
    shots[k] = { src: url, url: url, driveId: id };
    saveShots();
    refreshDetailChecks();
  } catch (err) {
    console.error('Drive upload failed', err);
    // Keep base64 preview, re-prompt auth if token expired
    if (err.status === 401) { gToken = null; gdriveAuth(); }
  }
}

// ═══════════════════════════════════════════════════════
function buildJourney() {
  const fd = SVC_FLOWS[curSvc]?.[curFlow];
  if (!fd) {
    // Show empty state for services with no flows yet (e.g. Flex before Sheet data)
    document.getElementById('phase-track').innerHTML = '<div class="actor-spacer"></div>';
    document.getElementById('actor-rows').innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted);font-size:13px">
      <div style="font-size:28px;margin-bottom:10px">⚡</div>
      <div style="font-weight:600;margin-bottom:6px">No flow data yet for this service</div>
      <div style="font-size:11.5px">Add rows with <code style="background:var(--bg);padding:2px 6px;border-radius:4px">service=flex</code> to your Google Sheet, then click ↻ Sync Sheet</div>
    </div>`;
    document.getElementById('flow-footer-text').textContent = '—';
    return;
  }
  const steps = fd.steps;

  // Phase track
  const track = document.getElementById('phase-track');
  [...track.querySelectorAll('.phase-group')].forEach(e => e.remove());
  const groups = [];
  steps.forEach(s => {
    const last = groups[groups.length-1];
    if (last && last.phase === s.phase) last.steps.push(s);
    else groups.push({ phase:s.phase, steps:[s] });
  });
  groups.forEach(g => {
    const pg = document.createElement('div');
    pg.className = 'phase-group';
    const lbl = document.createElement('div');
    lbl.className = 'phase-label-cell';
    lbl.textContent = g.phase;
    const hdrs = document.createElement('div');
    hdrs.className = 'phase-step-headers';
    g.steps.forEach(st => {
      const h = document.createElement('div');
      h.className = 'step-hdr' + (selKey && selKey.startsWith(st.id+'-') ? ' col-sel' : '');
      h.dataset.sid = st.id;
      h.innerHTML = `<div class="step-num">${String(st.id).padStart(2,'0')}</div><div class="step-hdr-title">${st.title}</div>`;
      h.addEventListener('click', () => {
        // Click header = select first non-null actor card for this step
        const first = ALL_ACTORS.map(a => ({a, cell:st[a.id]})).find(x => x.cell);
        if (first) handleCellClick(st.id, first.a.id, st);
      });
      hdrs.appendChild(h);
    });
    pg.appendChild(lbl);
    pg.appendChild(hdrs);
    track.appendChild(pg);
  });

  // Actor rows
  const rowsEl = document.getElementById('actor-rows');
  rowsEl.innerHTML = '';
  ALL_ACTORS.forEach(actor => {
    const row = document.createElement('div');
    row.className = `actor-row ${actor.row}`;
    row.innerHTML = `<div class="actor-label"><div class="actor-icon">${actor.icon}</div><div class="actor-name">${actor.name}</div><div class="actor-sub">${actor.sub}</div></div>`;
    const cells = document.createElement('div');
    cells.className = 'step-cells';

    steps.forEach(st => {
      const cellData = st[actor.id];
      const cell = document.createElement('div');
      const isSelCol = selKey && selKey.startsWith(st.id+'-');
      cell.className = 'step-cell' + (!cellData ? ' empty' : '') + (isSelCol ? ' col-sel' : '');
      cell.dataset.sid = st.id;

      if (cellData) {
        const isSel = selKey === `${st.id}-${actor.id}`;
        const relevantBadges = [...activeChk].filter(c =>
          CHECKS[c] && CHECKS[c].sids && CHECKS[c].sids.includes(st.sid)
        );
        const badges = relevantBadges.length
          ? `<div class="check-badges">${relevantBadges.map(c=>`<span class="check-badge">${CHECKS[c].icon} ${CHECKS[c].label}</span>`).join('')}</div>`
          : '';
        cell.innerHTML = `<div class="step-card ${cellData.c}${isSel?' selected':''}" data-sid="${st.id}" data-actor="${actor.id}">${cellData.t}${badges}</div>`;
        cell.addEventListener('click', () => handleCellClick(st.id, actor.id, st));
      }
      cells.appendChild(cell);
    });

    row.appendChild(cells);
    rowsEl.appendChild(row);
  });

  // Footer
  document.getElementById('flow-footer-text').textContent = fd.label + ' — ' + fd.summary;
}

  document.getElementById('d-content').innerHTML = `
    <div class="flow-badge ${fd.badge}">${fd.label}</div>
    <div class="d-step-num">Step ${stepId} · ${stepObj.phase} · ${svcLabel}</div>
    <div class="d-step-title">${d.fullTitle}</div>
    <div class="actor-pill" style="background:${sty.bg};color:${sty.color}">${ACTOR_NAMES[actor]||actor}</div>
    <div class="d-sec">What happens</div>
    <div class="d-desc">${d.desc}</div>
    ${chksHTML}
    <div class="divider"></div>
    <div class="d-sec">Triggered by</div>
    <div class="tag-wrap">${(d.triggers||[]).map(t=>`<span class="tag">→ ${t}</span>`).join('')}</div>
    <div class="d-sec" style="margin-top:12px">Notifies / handoffs</div>
    ${notifHTML}
    <div class="divider"></div>
    <div class="d-sec">Outputs</div>
    <div class="tag-wrap">${(d.outputs||[]).map(o=>`<span class="tag">✓ ${o}</span>`).join('')}</div>
    <div class="d-sec" style="margin-top:12px">Step type</div>
    <div class="tag-wrap">${(d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="divider"></div>
    <div class="d-sec">App screenshots <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:8.5px;color:var(--muted)">— click to upload or enlarge</span></div>
    <div class="ss-row" id="ss-row">${defaultSlots}${addSlot}</div>
  `;
}

function refreshDetailChecks() {
  if (!selKey) return;
  const [sid, actor] = selKey.match(/^(\d+)-(.+)$/).slice(1);
  const step = SVC_FLOWS[curSvc][curFlow].steps.find(s => s.id === parseInt(sid));
  if (step && step[actor]) renderDetail(curFlow, parseInt(sid), actor, step);
}

// Screenshots
function trigUpload(k) { document.getElementById('f-'+k)?.click(); }
function handleUpload(e,k) { const f=e.target.files[0]; if(!f)return; processUpload(f,k); }
function trigAdd(svc,flow,sid,actor) { document.getElementById(`add-${svc}-${flow}-${sid}-${actor}`)?.click(); }
function handleAdd(e,svc,flow,sid,actor) {
  const f=e.target.files[0]; if(!f)return;
  let i=0;
  while(shots[`${svc}-${flow}-${sid}-${actor}-${i}`]) i++;
  processUpload(f, `${svc}-${flow}-${sid}-${actor}-${i}`);
}
function rmShot(e,k){
  e.stopPropagation();
  const v = shots[k];
  // Optionally delete from Drive (best-effort)
  if (v && typeof v === 'object' && v.driveId && gToken) {
    fetch(`https://www.googleapis.com/drive/v3/files/${v.driveId}`, {
      method:'DELETE', headers:{ Authorization:'Bearer '+gToken }
    }).catch(()=>{});
  }
  delete shots[k]; saveShots(); refreshDetailChecks();
}
function openLB(k){
  const src = getShotSrc(k);
  document.getElementById('lb-img').src = src || '';
  document.getElementById('lightbox').classList.add('open');
}
function closeLB(){ document.getElementById('lightbox').classList.remove('open'); }
function lbBgClick(e){ if(e.target===document.getElementById('lightbox')) closeLB(); }

// ═══════════════════════════════════════════════════════
// SERVICE SWITCH
// ═══════════════════════════════════════════════════════
document.querySelectorAll('[data-svc]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-svc]').forEach(b => b.classList.remove('svc-active'));
    btn.classList.add('svc-active');
    curSvc = btn.dataset.svc;
    // Default to happy flow for new service
    curFlow = 'happy';
    activeChk.clear();
    closeDetail();
    renderCheckChips();
    renderFlowChips();
    buildJourney();
  });
});

document.getElementById('d-close').addEventListener('click', closeDetail);

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
renderCheckChips();
renderFlowChips();
buildJourney();
loadData();    // ← fetch Sheet data and re-render if available
gdriveInit();  // ← init Google Drive screenshot storage
</script>
<!-- Google Drive Auth Banner -->
<div id="gdrive-banner" class="gdrive-banner hidden">
  <div style="flex:1">
    <div style="font-weight:600;color:var(--text);margin-bottom:2px">📸 Screenshot storage</div>
    <div id="gdrive-status">Sign in with Google to save screenshots to Drive permanently.</div>
  </div>
  <button id="gdrive-btn" class="gdrive-btn" onclick="gdriveAuth()">Sign in</button>
</div>
</body>
</html>
